title: jena-fuseki-plus
description: 基于 Apache Jena Fuseki 4.10.0 的二次开发项目，将 Fuseki 嵌入 Spring Boot，并提供知识图谱可视化管理台。
baseurl: "/jena-fuseki-plus"
url: "https://zendodx.github.io/"

# just-the-docs 主题
theme: just-the-docs

# 导航：默认展开所有子菜单，不折叠
nav_fold: false

# 页内目录（右侧 TOC）：自动为 h2/h3 标题生成锚点
heading_anchors: true

# 全文搜索
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# 导航辅助链接（右上角）
aux_links:
  "GitHub":
    - "https://github.com/zendodx/jena-fuseki-plus"

aux_links_new_tab: true

# 页脚
footer_content: "Copyright &copy; 2024-2026 jena-fuseki-plus. Distributed under the Apache 2.0 license."

# 代码复制按钮
enable_copy_code_button: true

# 标注块（Callouts）
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# 返回顶部按钮
back_to_top: true
back_to_top_text: "返回顶部"

# Markdown 扩展
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Jekyll 插件
plugins:
  - jekyll-seo-tag

# 排除不需要渲染的目录
exclude:
  - "*.gemspec"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules/"
  - "vendor/"
  - "files/"

